name: Release

# Push a tag like `v0.4.0` to build all platform binaries and publish a
# GitHub Release with them attached. The tag must match `Version` in main.go.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify tag matches main.go Version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          FILE_VERSION=$(grep -oE 'Version = "[^"]+"' main.go | sed -E 's/.*"(.*)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "main.go Version = $FILE_VERSION ; tag = $TAG_VERSION"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match main.go Version $FILE_VERSION. Bump main.go and re-tag."
            exit 1
          fi

      - name: Build all platforms
        run: bash release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/anycode-daemon-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
